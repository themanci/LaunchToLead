<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Hack Quote — LinkedIn Graphic</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        .card {
            width: 1080px;
            height: 1080px;
            background: #0a0a0a;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 90px 80px;
            position: relative;
        }

        .quote {
            font-size: 46px;
            font-weight: 700;
            line-height: 1.45;
            color: #f1f5f9;
        }

        .highlight {
            color: #a3e635;
        }

        .profile {
            position: absolute;
            top: 44px;
            left: 70px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .li-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            background: #0a66c2;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 800;
            color: #fff;
            font-family: Georgia, serif;
            line-height: 1;
        }

        .profile-handle {
            font-size: 16px;
            color: #64748b;
            font-weight: 400;
            font-style: italic;
        }

        .logo {
            position: absolute;
            bottom: 48px;
            right: 80px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-box {
            width: 28px;
            height: 28px;
            background: #fff;
            color: #0a0a0a;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: #475569;
        }

        .logo-text span {
            font-weight: 300;
            color: #a3e635;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="profile">
        <img src="../../pictures/mansour/headshot_square.png" alt="Mansour Manci" class="avatar">
        <div>
            <div class="profile-name">Mansour Manci <span class="li-badge">in</span></div>
            <div class="profile-handle">@launchtolead</div>
        </div>
    </div>

    <p class="quote">
        A lot of engineers think that a good productivity hack comes by <span class="highlight">adding something</span> to their routine,<br><br>
        when in reality it comes from <span class="highlight">subtracting everything</span> except the thing you need to focus on.
    </p>

    <div class="logo">
        <div class="logo-box">L&sup2;</div>
        <div class="logo-text">Launch<span>ToLead</span></div>
    </div>
</div>

</body>
</html>
