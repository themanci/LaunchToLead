<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Ad Cover — RecentGrad 5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        @page { size: letter portrait; margin: 0; }
        .page {
            width: 8.5in;
            height: 11in;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
            position: relative;
            overflow: hidden;
            padding: 3in 1.2in 1.8in;
            gap: 1.2in;
        }
        .audience-section {
            font-size: 42px;
            font-weight: 800;
            color: #14b8a6;
            line-height: 1.25;
        }
        .hook {
            font-size: 36px;
            font-weight: 600;
            color: #fff;
            line-height: 1.35;
            padding: 0 0.2in;
        }
        .brand {
            position: absolute;
            bottom: 72px;
            right: 1.2in;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .headshot-section {
            position: absolute;
            bottom: 52px;
            left: 1.2in;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .headshot {
            width: 122px;
            height: 122px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(20, 184, 166, 0.4);
        }
        .headshot-name {
            font-size: 15px;
            font-weight: 600;
            color: #94a3b8;
            line-height: 1.3;
        }
        .headshot-name .name { color: #fff; font-weight: 700; }
        .brand-logo {
            width: 68px;
            height: 68px;
            background: #064e3b;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 800;
            color: #fff;
        }
        .brand-name {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.3px;
        }
        .brand-name .light { font-weight: 400; color: #14b8a6; }
    </style>
</head>
<body>
    <div class="page">
        <div class="audience-section">**Engineering recent grads**</div>
        <div class="hook">The job market isn&rsquo;t the only reason you&rsquo;re not getting interviews. Let me show you.</div>
        <div class="headshot-section">
            <img class="headshot" src="../../../../pictures/mansour/headshot_square.png" alt="Mansour Manci">
            <div class="headshot-name"><span class="name">Mansour Manci</span><br>Engineering Career Coach</div>
        </div>
        <div class="brand">
            <div class="brand-logo">L&sup2;</div>
            <div class="brand-name">Launch<span class="light">ToLead</span></div>
        </div>
    </div>
</body>
</html>
