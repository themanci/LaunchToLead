<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C'mon AI, Do Something — LinkedIn Meme</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #333;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px;
  }

  .canvas {
    width: 1080px;
    height: 1080px;
    background: #f8f8f8;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── BRANDING (subtle bottom) ── */
  .brand {
    position: absolute;
    bottom: 32px;
    right: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0.4;
  }
  .brand-logo {
    width: 32px;
    height: 32px;
    background: #0d1f0d;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: #a3e635;
  }
  .brand-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #333;
  }

  /* ── ILLUSTRATION ── */
  .scene {
    position: relative;
    width: 700px;
    height: 700px;
  }

  /* The stick figure */
  .figure {
    position: absolute;
    left: 80px;
    top: 120px;
  }

  /* "AI" block being poked */
  .ai-block {
    position: absolute;
    right: 60px;
    bottom: 160px;
    width: 200px;
    height: 200px;
    background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800;
    font-size: 88px;
    color: #64748b;
    border: 3px solid #94a3b8;
  }

  /* Caption text */
  .caption {
    position: absolute;
    top: 80px;
    right: 80px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 42px;
    font-weight: 600;
    color: #1e293b;
    text-align: right;
    line-height: 1.3;
  }

  svg {
    overflow: visible;
  }
</style>
</head>
<body>

<div class="canvas">

  <div class="scene">

    <!-- ═══ CAPTION ═══ -->
    <div class="caption">C'mon,<br>do something...</div>

    <!-- ═══ STICK FIGURE (SVG — matching original meme) ═══ -->
    <div class="figure">
      <svg width="420" height="500" viewBox="0 0 420 500" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Head (tall oval, slightly tilted forward like original) -->
        <ellipse cx="130" cy="42" rx="28" ry="42" stroke="#1e293b" stroke-width="4" fill="none"/>
        <!-- Cap visor (short brim sticking out the front/right) -->
        <path d="M150 22 L175 18" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
        <!-- Cap band line across head -->
        <path d="M104 26 Q130 16 158 22" stroke="#1e293b" stroke-width="3" fill="none"/>
        <!-- Cap button on top -->
        <circle cx="132" cy="2" r="3" fill="#1e293b"/>

        <!-- Neck -->
        <line x1="130" y1="84" x2="132" y2="105" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
        <!-- Body (slight forward lean) -->
        <line x1="132" y1="105" x2="138" y2="250" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>

        <!-- Left arm: shoulder → elbow → hand (both hands together in front, gripping stick) -->
        <polyline points="134,130 110,175 130,210" stroke="#1e293b" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Right arm: shoulder → elbow → same grip point -->
        <polyline points="134,130 158,180 140,215" stroke="#1e293b" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- The long stick (from hands down to poke AI) -->
        <line x1="135" y1="212" x2="350" y2="410" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round"/>

        <!-- Left leg (slight bend, standing) -->
        <polyline points="138,250 118,340 112,400" stroke="#1e293b" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Left foot -->
        <line x1="112" y1="400" x2="90" y2="403" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>

        <!-- Right leg -->
        <polyline points="138,250 158,340 162,400" stroke="#1e293b" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Right foot -->
        <line x1="162" y1="400" x2="184" y2="403" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- ═══ AI BLOCK ═══ -->
    <div class="ai-block">AI</div>

  </div>

  <!-- ═══ BRANDING ═══ -->
  <div class="brand">
    <div class="brand-logo">L²</div>
    <span class="brand-name">launchtolead</span>
  </div>

</div>

</body>
</html>
