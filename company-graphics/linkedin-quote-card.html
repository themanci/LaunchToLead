<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Quote Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1080px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .card {
            width: 1080px;
            height: 1080px;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 110px 100px 80px 100px;
            position: relative;
        }

        .profile-row {
            display: flex;
            align-items: center;
            gap: 22px;
            margin-bottom: 60px;
        }

        .avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .profile-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 30px;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }

        .verified {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .verified svg {
            width: 28px;
            height: 28px;
        }

        .profile-handle {
            font-size: 24px;
            font-weight: 400;
            color: #71717a;
            line-height: 1;
        }

        .quote-text {
            font-size: 52px;
            font-weight: 600;
            color: #fff;
            line-height: 1.35;
            letter-spacing: -0.5px;
        }


    </style>
</head>
<body>
    <div class="card">
        <div class="profile-row">
            <img class="avatar" src="C:\Coding\coachingBusiness\launch-to-lead\pictures\mansour\headshot.png" alt="Mansour Manci">
            <div class="profile-info">
                <div class="profile-name">
                    Mansour Manci
                    <span class="verified">
                        <!-- LinkedIn-style blue checkmark -->
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="12" fill="#0A66C2"/>
                            <path d="M7 12.5l3.5 3.5 6.5-7" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </div>
                <div class="profile-handle">@launchtolead.io</div>
            </div>
        </div>

        <div class="quote-text">
            Surviving engineering school is hard, but walking into an interview and not knowing how to sell yourself after can feel harder.
        </div>


    </div>
</body>
</html>
